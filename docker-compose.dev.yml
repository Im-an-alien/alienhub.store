# Local development: Postgres only. The Next.js app runs on the host via `npm run dev`.
# Start with:  docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:16-alpine
    container_name: alienhub-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: alienhub
      POSTGRES_PASSWORD: alienhub_dev
      POSTGRES_DB: alienhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alienhub -d alienhub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata_dev:
